<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<meta name="theme-color" content="#040810">
<title>EntreFlow — Signature de devis</title>
<style>
:root{--bg:#040810; --card:rgba(6,10,28,.85); --border:rgba(96,165,250,.15); --blue:#2563EB; --blue-l:#60A5FA; --green:#10B981; --red:#EF4444; --white:#EEF2FF; --gray:#8A9AC2;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg); color:var(--white); font-family:'Segoe UI',system-ui,-apple-system,sans-serif; min-height:100vh;}
.wrap{max-width:760px; margin:24px auto; padding:0 16px 60px;}
.card{background:var(--card); border:1px solid var(--border); border-radius:18px; padding:22px 20px; margin-bottom:14px;}
.card h2{font-size:16px; color:var(--blue-l); margin-bottom:10px;}
.row{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid rgba(255,255,255,.04); font-size:13.5px;}
.row b{color:var(--white);}
.row span{color:var(--gray); text-align:right; max-width:60%;}
.total{font-size:22px; font-weight:900;}
.actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;}
.btn{flex:1 1 auto; min-width:160px; padding:14px; border:none; border-radius:999px; color:#fff; font-weight:800; cursor:pointer; font-size:14px; text-align:center; text-decoration:none;}
.btn-p{background:var(--blue);}
.btn-n{background:rgba(255,255,255,.06); border:1px solid var(--border); color:var(--gray);}
.empty{text-align:center; padding:60px 20px; color:var(--gray);}
.error{color:#FCA5A5; background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.25); padding:12px 14px; border-radius:12px; font-size:13px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h2>Devis</h2>
    <div id="quoteArea"></div>
  </div>
  <div class="actions">
    <a class="btn btn-p" id="signBtn" href="#">Signer le devis</a>
    <button class="btn btn-n" onclick="history.back()">Retour</button>
  </div>
</div>
<script>
const API_BASE = 'https://script.google.com/macros/s/AKfycbzy8sUmoTDlbYfzgqadT6EbW15lZqAp-MINJHdsqpecxkR5ZM-AuyA7JpX01J3WmS8j/exec';
const params = new URLSearchParams(location.search);
const signId = params.get('sign');
const token = params.get('t');
const quoteArea = document.getElementById('quoteArea');
const signBtn = document.getElementById('signBtn');

async function api(action, payload) {
  const body = Object.assign({ action }, payload || {});
  const r = await fetch(API_BASE, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(body) });
  const text = await r.text();
  let data = {};
  try { data = JSON.parse(text); } catch (e) {}
  if (!r.ok || data.ok === false) throw new Error(data.error || 'Erreur serveur');
  return data.result !== undefined ? data.result : data;
}

async function load() {
  if (!signId || !token) {
    quoteArea.innerHTML = `<div class="error">Lien invalide. Paramètres manquants.</div>`;
    return;
  }
  try {
    const quote = await api('getQuoteForSign', { id: signId, token });
    if (!quote) throw new Error('Devis introuvable');
    const items = Array.isArray(quote.items) ? quote.items : [];
    let html = `
      <div class="row"><b>Devis</b><span>#${quote.quote_number || '-'}</span></div>
      <div class="row"><b>Client</b><span>${quote.client_name || '-'}</span></div>
      <div class="row"><b>Date</b><span>${quote.created_at ? quote.created_at.slice(0,10) : '-'}</span></div>
      <div class="row"><b>Validité</b><span>${quote.validite_jours || 30} jours</span></div>
    `;
    if (items.length) {
      html += `<div style="margin-top:10px; color:var(--gray); font-size:11px; text-transform:uppercase; letter-spacing:.08em;">Articles</div>`;
      items.forEach(it => {
        html += `<div class="row"><span>${it.label || it.name || 'Article'}</span><span>${it.qty||0} x ${it.unit_price||0} = ${it.total||0}</span></div>`;
      });
    }
    html += `<div class="row total" style="margin-top:10px;"><b>Total</b><span>${quote.total || 0}</span></div>`;
    quoteArea.innerHTML = html;
    signBtn.href = API_BASE + '?action=signQuote&id=' + encodeURIComponent(signId) + '&token=' + encodeURIComponent(token);
  } catch (e) {
    quoteArea.innerHTML = `<div class="error">${escapeHtml(e.message)}</div>`;
  }
}

function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
load();
</script>
</body>
</html>
