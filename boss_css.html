<style>
:root{
  --bg:#040810; --navy:#060D25; --sidebar-bg:rgba(4,6,18,.97);
  --blue:#2563EB; --blue-m:#3B82F6; --blue-l:#60A5FA; --blue-xs:rgba(96,165,250,.08);
  --white:#EEF2FF; --gray:#8A9AC2; --gray-d:#3A4568;
  --border:rgba(96,165,250,.10); --border-h:rgba(96,165,250,.22);
  --card:rgba(6,10,28,.70); --card-h:rgba(8,14,36,.85);
  --green:#10B981; --amber:#F59E0B; --red:#EF4444; --purple:#8B5CF6;
  --sb-w:256px; --radius:14px; --radius-sm:9px; --radius-xs:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;overflow-x:hidden;font-size:14px;}
canvas#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
h1,h2,h3,h4{font-family:'Syne',sans-serif;letter-spacing:-.02em;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:4px;}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
@keyframes float-y{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(37,99,235,.4)}70%{box-shadow:0 0 0 9px rgba(37,99,235,0)}100%{box-shadow:0 0 0 0 rgba(37,99,235,0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

#loadingScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .4s;}
#loadingScreen.hide{opacity:0;pointer-events:none;}
.spinner{width:42px;height:42px;border:2.5px solid rgba(96,165,250,.12);border-top-color:var(--blue-l);border-radius:50%;animation:spin .75s linear infinite;}

#setupScreen{position:fixed;inset:0;background:rgba(4,6,18,.98);backdrop-filter:blur(16px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
#setupScreen.show{display:flex;}
.setup-box{max-width:520px;width:100%;background:rgba(6,10,30,.96);border:1px solid var(--border);border-radius:24px;padding:36px;max-height:92vh;overflow-y:auto;animation:popIn .35s ease;}
.setup-logo{display:flex;align-items:center;gap:12px;margin-bottom:26px;}
.logo-icon{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#1D4ED8,#60A5FA);display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:pulse-ring 3s ease-in-out infinite, float-y 4.5s ease-in-out infinite;}
.logo-icon svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.logo-text{font-size:22px;font-weight:800;font-family:'Syne',sans-serif;background:linear-gradient(90deg,#fff 30%,var(--blue-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.setup-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.setup-sub{font-size:13px;color:var(--gray);margin-bottom:26px;line-height:1.65;}

.fg{margin-bottom:14px;}
.fg label{display:block;font-size:10px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 13px;background:rgba(4,6,18,.65);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--white);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:.2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(96,165,250,.45);background:rgba(37,99,235,.05);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.fg input::placeholder,.fg textarea::placeholder{color:var(--gray-d);}
.fg select option{background:#060D25;}
.fg textarea{resize:vertical;min-height:68px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;border-radius:999px;font-size:13px;font-weight:500;transition:.2s;text-decoration:none;position:relative;overflow:hidden;}
.btn svg{flex-shrink:0;}
.btn-primary{background:linear-gradient(108deg,#1D4ED8,var(--blue-m));color:#fff;padding:11px 22px;box-shadow:0 4px 18px rgba(29,78,216,.28);}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 26px rgba(29,78,216,.4);}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn-outline{background:rgba(255,255,255,.035);border:1px solid var(--border);color:var(--white);padding:9px 18px;}
.btn-outline:hover{background:rgba(96,165,250,.07);border-color:var(--border-h);}
.btn-sm{background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.22);color:var(--blue-l);padding:6px 13px;font-size:12px;border-radius:999px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.2s;}
.btn-sm:hover{background:rgba(37,99,235,.24);border-color:rgba(37,99,235,.4);}
.btn-sm.active-tab{background:rgba(37,99,235,.3);border-color:rgba(37,99,235,.5);color:#fff;}
.btn-danger{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.25);color:var(--red);padding:6px 10px;border-radius:var(--radius-xs);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.2s;}
.btn-danger:hover{background:rgba(239,68,68,.18);}
.btn-icon{background:rgba(59,130,246,.09);border:1px solid rgba(59,130,246,.18);color:var(--blue-l);padding:6px 10px;border-radius:var(--radius-xs);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.2s;}
.btn-icon:hover{background:rgba(59,130,246,.18);}
.btn-full{width:100%;padding:12px;}
.btn-green{background:linear-gradient(108deg,#059669,var(--green));color:#fff;padding:11px 22px;box-shadow:0 4px 18px rgba(16,185,129,.28);}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 8px 26px rgba(16,185,129,.4);}
.btn-loading{opacity:.45;pointer-events:none;filter:grayscale(.25);}

#dashboard{display:none;min-height:100vh;position:relative;z-index:1;}

.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sb-w);background:var(--sidebar-bg);backdrop-filter:blur(24px);border-right:1px solid var(--border);z-index:50;display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1);}
.sidebar.collapsed{transform:translateX(-256px);}
.sb-header{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.sb-logo .logo-icon{width:30px;height:30px;border-radius:9px;}
.sb-logo .logo-icon svg{width:16px;height:16px;}
.sb-logo .logo-text{font-size:16px;}
.sb-company{padding:9px 11px;background:rgba(96,165,250,.05);border:1px solid var(--border);border-radius:11px;cursor:pointer;transition:.18s;}
.sb-company:hover{background:rgba(96,165,250,.10);border-color:var(--border-h);}
.sb-company-av{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--blue-m),var(--blue-l));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;overflow:hidden;flex-shrink:0;}
.sb-company-av img{width:100%;height:100%;object-fit:cover;}
.sb-company-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;}
.sb-company-edit{font-size:10px;color:var(--gray);}
.sb-nav{flex:1;overflow-y:auto;padding:12px 8px;}
.nav-group{font-size:9px;font-weight:600;color:rgba(138,154,194,.35);padding:0 9px;margin:14px 0 5px;text-transform:uppercase;letter-spacing:.09em;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;color:var(--gray);cursor:pointer;transition:.16s;margin-bottom:2px;font-size:13px;position:relative;}
.nav-item:hover{background:rgba(96,165,250,.06);color:var(--white);}
.nav-item.active{background:rgba(37,99,235,.16);color:var(--blue-l);font-weight:500;}
.nav-item.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:2.5px;background:var(--blue-l);border-radius:2px;}
.nav-item svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.nav-badge{margin-left:auto;font-size:10px;background:var(--red);color:#fff;padding:1px 6px;border-radius:999px;font-weight:600;min-width:18px;text-align:center;}
.sb-footer{padding:10px 8px;border-top:1px solid var(--border);}

.topbar{position:fixed;top:0;left:var(--sb-w);right:0;height:60px;z-index:40;background:rgba(4,8,22,.90);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;transition:left .28s cubic-bezier(.4,0,.2,1);}
.topbar.expanded{left:0;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.menu-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray);transition:.18s;}
.menu-btn:hover{background:rgba(96,165,250,.08);color:var(--white);border-color:var(--border-h);}
.menu-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;}
.topbar-title{font-size:14px;font-weight:600;font-family:'Syne',sans-serif;}
.topbar-right{display:flex;align-items:center;gap:9px;}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:rgba(255,255,255,.025);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:.18s;}
.icon-btn:hover{background:rgba(96,165,250,.09);border-color:var(--border-h);}
.icon-btn svg{width:16px;height:16px;stroke:var(--gray);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.notif-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--red);border:1.5px solid var(--bg);}
.user-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-l));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;overflow:hidden;border:2px solid rgba(96,165,250,.2);}
.user-av img{width:100%;height:100%;object-fit:cover;}

.main{margin-left:var(--sb-w);padding:78px 24px 48px;transition:margin .28s cubic-bezier(.4,0,.2,1);min-height:100vh;}
.main.expanded{margin-left:0;}

.page{display:none;}
.page.active{display:block;animation:fadein .35s ease;}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.page-header h1{font-size:22px;font-weight:700;word-break:break-word;overflow-wrap:anywhere;}
.page-header p{font-size:13px;color:var(--gray);margin-top:3px;}
.date-chip{font-size:11px;padding:5px 13px;background:rgba(37,99,235,.09);border:1px solid var(--border);border-radius:999px;color:var(--blue-l);font-weight:500;white-space:nowrap;flex-shrink:0;}
.period-tabs{display:flex;gap:5px;background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:999px;padding:3px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.period-tabs::-webkit-scrollbar{display:none;}
.period-btn{background:transparent;border:none;color:var(--gray);font-size:12px;padding:6px 13px;border-radius:999px;cursor:pointer;font-weight:500;transition:.2s;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;}
.period-btn.active{background:rgba(37,99,235,.22);color:var(--white);font-weight:600;}
.period-btn:hover:not(.active){color:var(--white);}
.page-header > div:last-child{display:flex;align-items:center;gap:10px;flex-wrap:wrap;max-width:100%;}
@media(max-width:1024px){.page-header{align-items:flex-start;}}
@media(max-width:760px){.page-header{flex-direction:column;align-items:stretch;gap:10px;}.page-header h1{font-size:19px;}.page-header > div:last-child{justify-content:space-between;width:100%;}.period-tabs{flex:1;justify-content:flex-start;}}
@media(max-width:480px){.page-header h1{font-size:17px;}.page-header p{font-size:12px;}.date-chip{font-size:10px;padding:4px 10px;}.period-btn{font-size:11px;padding:5px 10px;}.page-header > div:last-child{flex-direction:row;gap:8px;}}
body.ef-xs .page-header,body.ef-sm .page-header{flex-direction:column;align-items:stretch;}
body.ef-xs .page-header > div:last-child,body.ef-sm .page-header > div:last-child{width:100%;justify-content:space-between;}
body.ef-md .page-header{align-items:flex-start;}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:.2s;position:relative;overflow:hidden;}
.kpi:hover{transform:translateY(-2px);border-color:var(--border-h);background:var(--card-h);}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.kpi-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.kpi-chip{font-size:10px;padding:3px 8px;border-radius:999px;font-weight:500;}
.chip-up{background:rgba(16,185,129,.10);color:var(--green);}
.chip-neu{background:rgba(245,158,11,.10);color:var(--amber);}
.chip-blue{background:rgba(96,165,250,.10);color:var(--blue-l);}
.kpi-val{font-size:28px;font-weight:800;font-family:'Syne',sans-serif;line-height:1.1;margin-bottom:4px;}
.kpi-lbl{font-size:12px;color:var(--gray);}
.kpi-progress{margin-top:10px;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
.kpi-progress-fill{height:3px;border-radius:2px;transition:width .8s ease;}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:18px;}
.card:hover{border-color:rgba(96,165,250,.14);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.card-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;color:var(--white);}
.card-title svg{width:16px;height:16px;stroke:var(--blue-l);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.card-actions{display:flex;align-items:center;gap:7px;}

.view-toggle{display:flex;gap:4px;background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:999px;padding:3px;}
.vt-btn{background:transparent;border:none;color:var(--gray);font-size:11px;padding:5px 11px;border-radius:999px;cursor:pointer;font-weight:500;transition:.2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;}
.vt-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;}
.vt-btn.active{background:rgba(37,99,235,.22);color:var(--white);}
.vt-btn:hover:not(.active){color:var(--white);}

.charts-row{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:18px;}
.chart-wrap{height:250px;position:relative;overflow:hidden;}
.chart-wrap canvas,.chart-box canvas{max-width:100%;height:100%;}

.stock-rings{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0;}
.ring-wrap{position:relative;width:80px;height:80px;max-width:100%;}
.ring-wrap canvas{position:absolute;inset:0;width:100% !important;height:100% !important;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pct{font-size:15px;font-weight:700;font-family:'Syne',sans-serif;}
.ring-name{font-size:11px;color:var(--gray);text-align:center;max-width:100px;line-height:1.3;}
.ring-qty{font-size:10px;color:var(--gray);}

.tbl-wrap{overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;padding:9px 8px;font-size:10px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);}
.tbl td{padding:10px 8px;font-size:13px;border-bottom:1px solid rgba(96,165,250,.05);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(96,165,250,.025);}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500;}
.b-ok{background:rgba(16,185,129,.11);color:var(--green);}
.b-warn{background:rgba(245,158,11,.11);color:var(--amber);}
.b-err{background:rgba(239,68,68,.11);color:var(--red);}
.b-info{background:rgba(96,165,250,.11);color:var(--blue-l);}
.b-purple{background:rgba(139,92,246,.11);color:var(--purple);}

.empty-state{text-align:center;padding:44px 20px;color:var(--gray);}
.empty-icon{display:flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:14px;background:rgba(37,99,235,.08);border:1px solid var(--border);margin:0 auto 14px;}
.empty-icon svg{width:24px;height:24px;stroke:var(--gray);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.empty-state strong{display:block;font-size:13px;color:var(--white);margin-bottom:5px;font-weight:600;}
.empty-state span{font-size:12px;line-height:1.6;}

.stk-bar{width:70px;height:4px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-top:4px;}
.stk-bar-fill{height:4px;border-radius:3px;transition:width .5s ease;}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
.stat-mini{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:.2s;}
.stat-mini:hover{border-color:var(--border-h);}
.stat-mini-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stat-mini-icon svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.stat-mini-val{font-size:18px;font-weight:700;font-family:'Syne',sans-serif;line-height:1.1;}
.stat-mini-lbl{font-size:11px;color:var(--gray);}

.sale-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:.5px solid rgba(96,165,250,.05);}
.sale-row:last-child{border-bottom:none;}
.sale-client{font-size:13px;font-weight:500;}
.sale-num{font-size:11px;color:var(--gray);}
.sale-amt{font-size:13px;font-weight:600;color:var(--blue-l);}
.sale-date{font-size:11px;color:var(--gray);}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.show{display:flex;}
.modal-box{background:rgba(6,10,28,.98);border:1px solid var(--border);border-radius:20px;padding:26px;width:100%;max-width:490px;max-height:88vh;overflow-y:auto;animation:popIn .25s ease;}
.modal-box.wide{max-width:640px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-head h3{font-size:17px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--gray);cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.modal-close:hover{background:rgba(255,255,255,.07);color:var(--white);}
.modal-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}
.pm-batch-list{max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.pm-batch-item{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;}
.pm-batch-item span{display:flex;align-items:center;gap:8px;}

#companyPanel{position:fixed;inset:0;z-index:250;background:rgba(4,6,18,.82);backdrop-filter:blur(12px);display:none;justify-content:flex-end;}
#companyPanel.show{display:flex;}
.cp-box{width:100%;max-width:420px;height:100vh;background:rgba(6,10,28,.98);border-left:1px solid var(--border);padding:26px;overflow-y:auto;animation:fadein .3s ease;}
.cp-section{margin-bottom:20px;}
.cp-section-title{font-size:10px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

#toastContainer{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px;}
