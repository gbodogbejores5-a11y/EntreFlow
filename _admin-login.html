<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EntreFlow — Admin</title>
<style>
:root{--bg:#050A1A;--card:#0A1030;--blue:#2563EB;--blue-m:#3B82F6;--white:#F1F5FF;--gray:#8A99C2;--border:rgba(59,130,246,.18);--red:#F87171;--green:#10B981;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:100%;max-width:420px;background:rgba(10,16,48,.55);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:22px;padding:28px;box-shadow:0 24px 70px -16px rgba(0,0,0,.6);}
h1{font-family:'Syne',system-ui,sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;}
.sub{font-size:12px;color:var(--gray);margin-bottom:18px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.field input{width:100%;padding:11px 14px;background:rgba(8,13,38,.7);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--white);font-family:inherit;outline:none;}
.field input:focus{border-color:var(--blue-m);box-shadow:0 0 0 4px rgba(37,99,235,.13);}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;background:linear-gradient(105deg,var(--blue),var(--blue-m));box-shadow:0 8px 24px rgba(37,99,235,.35);transition:.2s;}
.btn:hover{filter:brightness(1.08);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{color:var(--red);font-size:13px;margin-top:10px;display:none;}
.muted{font-size:11px;color:var(--gray);margin-top:10px;text-align:center;}
</style>
</head>
<body>
<div class="card">
  <h1>Administration</h1>
  <p class="sub">Accès réservé</p>
  <div class="field">
    <label>Mot de passe</label>
    <input type="password" id="secret" placeholder="Saisir le mot de passe admin" onkeydown="if(event.key==='Enter')login()"/>
  </div>
  <button class="btn" id="send" onclick="login()">Se connecter</button>
  <div class="err" id="err">Mot de passe incorrect.</div>
  <p class="muted">Protection serveur</p>
</div>

<script>
const API_BASE = 'https://script.google.com/macros/s/AKfycbyiqfU7uiPrSSsD0-z3VYtS2DXkPM4QFEYd9Pdygu44QDJEfM9Nx8EBogKAU_70CLDY/exec';
const errEl = document.getElementById('err');
const btn = document.getElementById('send');
function setErr(msg){ errEl.textContent = msg; errEl.style.display = msg ? 'block' : 'none'; }
async function login(){
  const secret = document.getElementById('secret').value.trim();
  if(!secret){ setErr('Saisissez le secret.'); return; }
  btn.disabled = true; setErr('');
  try{
    const r = await fetch(API_BASE,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'superAdminLogin', secret})});
    const data = await r.json().catch(()=>({}));
    if(data?.ok){
      localStorage.setItem('entreflowSuperAdmin', secret);
      location.href = '/_admin.html';
    } else {
      setErr(data?.error || 'Mot de passe incorrect.');
      document.getElementById('secret').value='';
      document.getElementById('secret').focus();
    }
  } catch(e){
    setErr('Erreur réseau : ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
if(localStorage.getItem('entreflowSuperAdmin')) location.href = '/_admin.html';
</script>
</body>
</html>
